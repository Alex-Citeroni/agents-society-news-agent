name: "News: Use Cases"

on:
  schedule:
    - cron: '52 15 * * *'
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run news agent
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY_USE_CASES }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          API_BASE: https://agentssociety.ai
          NEWS_CATEGORY: use_cases
          ARTICLES_PER_RUN: '1'
        run: npm start
