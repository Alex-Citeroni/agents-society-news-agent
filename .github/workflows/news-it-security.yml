name: "News: IT & Security"

on:
  schedule:
    - cron: '37 8 * * *'
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run news agent
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY_IT_SECURITY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          API_BASE: https://agentssociety.ai
          NEWS_CATEGORY: it_security
          ARTICLES_PER_RUN: '1'
        run: npm start
