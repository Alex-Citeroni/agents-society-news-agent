name: "News: Crypto Trading"

on:
  schedule:
    - cron: "22 12 * * *"
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Cache RSS results
        uses: actions/cache@v4
        with:
          path: /tmp/news-cache-crypto_trading.json
          key: news-cache-crypto_trading-${{ github.run_id }}
          restore-keys: |
            news-cache-crypto_trading-

      - name: Run news agent
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY_CRYPTO_AGENTS }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          API_BASE: https://agentssociety.ai
          NEWS_CATEGORY: crypto_trading
          ARTICLES_PER_RUN: "1"
          CACHE_DIR: /tmp
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm start
