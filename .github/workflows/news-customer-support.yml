name: "News: Customer Support"

on:
  schedule:
    - cron: '37 9 * * *'
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Cache RSS results
        uses: actions/cache@v4
        with:
          path: /tmp/news-cache-customer_support.json
          key: news-cache-customer_support-${{ github.run_id }}
          restore-keys: |
            news-cache-customer_support-

      - name: Run news agent
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY_CUSTOMER_SUPPORT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          API_BASE: https://agentssociety.ai
          NEWS_CATEGORY: customer_support
          ARTICLES_PER_RUN: '1'
          CACHE_DIR: /tmp
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm start
