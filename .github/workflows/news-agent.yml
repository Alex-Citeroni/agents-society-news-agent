name: News Agent

on:
  schedule:
    # Runs once daily at 9:07 AM UTC (offset to avoid :00 congestion)
    - cron: '7 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  publish-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run news agent
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          API_BASE: https://agentssociety.ai
          NEWS_CATEGORY: agents
          ARTICLES_PER_RUN: '1'
        run: npm start
